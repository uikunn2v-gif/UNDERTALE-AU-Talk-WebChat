<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: sans-serif;
    }

    input, button {
      background-color: #222;
      color: white;
      border: 1px solid #555;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<h2>チャット</h2>

<input id="name" placeholder="名前（20文字まで）"><br>
<input id="pass" placeholder="管理者パスワード（任意）"><br>
<input id="msg" placeholder="メッセージ（300文字まで）">
<button onclick="send()">送信</button>

<p id="status"></p>

<ul id="chat"></ul>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "test",
  authDomain: "test",
  databaseURL: "https://undertale-au-talk-web-default-rtdb.firebaseio.com/",
  projectId: "undertale-au-talk-web"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MAX_MESSAGES = 20;
const MAX_USERS = 10;
const ADMIN_PASSWORD = "Over2520World-10-101-10-0-NecroNight";

// 🔥 ユーザーID生成
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}

// 🔹 入室処理
window.onload = async () => {
  const savedName = localStorage.getItem("username");
  if (savedName) {
    document.getElementById("name").value = savedName;
  }

  const snapshot = await db.ref("users").once("value");
  const users = snapshot.val() || {};
  const count = Object.keys(users).length;

  const pass = document.getElementById("pass").value;
  const isAdmin = pass === ADMIN_PASSWORD;

  // 🔥 満員チェック（管理者は無視）
  if (!users[userId] && count >= MAX_USERS && !isAdmin) {
    document.getElementById("status").textContent = "満員です（10人まで）";
    document.querySelector("button").disabled = true;
    return;
  }

  // 🔥 入室
  db.ref("users/" + userId).set(true);
  db.ref("users/" + userId).onDisconnect().remove();

  document.getElementById("status").textContent =
    isAdmin ? "管理者として入室中" : "入室中（現在人数：" + (count + 1) + "人）";
};

// 🔹 メッセージ送信
async function send() {
  let name = document.getElementById("name").value.trim();
  let msg = document.getElementById("msg").value.trim();
  let pass = document.getElementById("pass").value;

  if (name.length === 0 || msg.length === 0) return;

  if (name.length > 20) {
    alert("名前は20文字まで！");
    return;
  }

  if (msg.length > 300) {
    alert("メッセージは300文字まで！");
    return;
  }

  const isAdmin = pass === ADMIN_PASSWORD;

  // 🔥 名前保存
  localStorage.setItem("username", name);

  await db.ref("chat").push({
    name: name,
    message: msg
  });

  document.getElementById("msg").value = "";

  // 🔥 20件制限
  const snapshot = await db.ref("chat").once("value");
  const messages = snapshot.val() || {};
  const keys = Object.keys(messages);

  if (keys.length > MAX_MESSAGES) {
    const excess = keys.length - MAX_MESSAGES;
    for (let i = 0; i < excess; i++) {
      await db.ref("chat/" + keys[i]).remove();
    }
  }
}

// 🔹 表示
db.ref("chat").on("child_added", snapshot => {
  const data = snapshot.val();
  if (!data || !data.name || !data.message) return;

  const li = document.createElement("li");
  li.id = snapshot.key;
  li.textContent = data.name + "： " + data.message;

  document.getElementById("chat").appendChild(li);
});

// 🔹 削除反映
db.ref("chat").on("child_removed", snapshot => {
  const li = document.getElementById(snapshot.key);
  if (li) li.remove();
});
</script>

</body>
</html>
<button onclick="resetAll()">全部リセット</button>

<script>
async function resetAll() {
  if (!confirm("本当に全部消す？")) return;

  await db.ref("chat").remove();
  await db.ref("users").remove();

  alert("全部削除した！");
  location.reload();
}
</script>
