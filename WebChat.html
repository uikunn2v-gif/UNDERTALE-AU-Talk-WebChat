<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>
<body>

<h2>チャット</h2>

<input id="name" placeholder="名前"><br>
<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>

<ul id="chat"></ul>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "test",
  authDomain: "test",
  databaseURL: "https://undertale-au-talk-web-default-rtdb.firebaseio.com/",
  projectId: "undertale-au-talk-web"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MAX_MESSAGES = 20;

// 🔹 メッセージ送信
async function send() {
  const name = document.getElementById("name").value;
  const msg = document.getElementById("msg").value;

  if (name !== "" && msg !== "") {
    await db.ref("chat").push({
      name: name,
      message: msg
    });

    document.getElementById("msg").value = "";

    // 🔥 古いメッセージ削除（20件制限）
    const snapshot = await db.ref("chat").once("value");
    const messages = snapshot.val() || {};
    const keys = Object.keys(messages);

    if (keys.length > MAX_MESSAGES) {
      const excess = keys.length - MAX_MESSAGES;
      for (let i = 0; i < excess; i++) {
        await db.ref("chat/" + keys[i]).remove();
      }
    }
  }
}

// 🔹 表示
db.ref("chat").on("child_added", snapshot => {
  const data = snapshot.val();
  if (!data || !data.name || !data.message) return;

  const li = document.createElement("li");
  li.id = snapshot.key;
  li.textContent = data.name + "： " + data.message;
  document.getElementById("chat").appendChild(li);
});

// 🔹 削除されたら画面からも消す
db.ref("chat").on("child_removed", snapshot => {
  const li = document.getElementById(snapshot.key);
  if (li) li.remove();
});
</script>

</body>
</html>
