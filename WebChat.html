<!DOCTYPE html>
<html>
<head>
  <title>Chat Test</title>
</head>
<body>

<h2>テスト自動送信</h2>
<ul id="chat"></ul>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "test",
  authDomain: "test",
  databaseURL: "https://undertale-au-talk-web-default-rtdb.firebaseio.com/",
  projectId: "undertale-au-talk-web"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MAX_MESSAGES = 20;
const TEST_USER = "TestBot";

// 🔹 child_added で画面表示
db.ref("chat").on("child_added", snapshot => {
  const data = snapshot.val();
  if (!data || !data.name || !data.message) return;

  const li = document.createElement("li");
  li.id = snapshot.key;
  li.textContent = data.name + "： " + data.message;
  document.getElementById("chat").appendChild(li);
});

// 🔹 child_removed で画面から削除
db.ref("chat").on("child_removed", snapshot => {
  const li = document.getElementById(snapshot.key);
  if (li) li.remove();
});

// 🔹 テスト送信
async function sendTestMessages(count) {
  for (let i = 1; i <= count; i++) {
    await db.ref("chat").push({
      name: TEST_USER,
      message: "テストメッセージ " + i
    });

    // 送信後に古いメッセージを削除
    const snapshot = await db.ref("chat").once("value");
    const messages = snapshot.val() || {};
    const keys = Object.keys(messages);

    if (keys.length > MAX_MESSAGES) {
      const excess = keys.length - MAX_MESSAGES;
      for (let j = 0; j < excess; j++) {
        await db.ref("chat/" + keys[j]).remove();
      }
    }
  }
}

// 🔹 自動テスト（21件送信）
sendTestMessages(21);
</script>

</body>
</html>
