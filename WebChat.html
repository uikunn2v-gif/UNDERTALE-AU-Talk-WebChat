<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>
<body>
  <h2>チャット</h2>
  <input id="msg" placeholder="メッセージ">
  <button onclick="send()">送信</button>
  <ul id="chat"></ul>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "test",
      authDomain: "test",
      databaseURL: "https://undertale-au-talk-web-default-rtdb.firebaseio.com/",
      projectId: "undertale-au-talk-web"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function send() {
      const msg = document.getElementById("msg").value;
      if (msg !== "") {
        db.ref("chat").push(msg);
      }
    }

    db.ref("chat").on("child_added", snapshot => {
      const li = document.createElement("li");
      li.textContent = snapshot.val();
      document.getElementById("chat").appendChild(li);
    });
  <script>
function send() {
  const name = document.getElementById("name").value;
  const msg = document.getElementById("msg").value;

  if (name !== "" && msg !== "") {
    db.ref("chat").push({
      name: name,
      message: msg
    });

    // 入力リセット
    document.getElementById("msg").value = "";
  }
}

db.ref("chat").on("child_added", snapshot => {
  const data = snapshot.val();

  // 🔥 ここが最重要（これ無いとバグる）
  if (!data || !data.name || !data.message) return;

  const li = document.createElement("li");
  li.textContent = data.name + "： " + data.message;

  document.getElementById("chat").appendChild(li);
});
</script>
